plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
    // END: FlutterFire Configuration
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.example.agro_employee_public"
    // compileSdk = 35
   compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.agro_employee_public"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdkVersion flutter.minSdkVersion
        // targetSdk = 34
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            // key.properties не в репо (см. android/.gitignore) — каждый,
            // кто собирает release, должен получить файл отдельно (бэкап/
            // секрет-менеджер). Без него release-сборка падает на getProperty
            // ниже, а не молча подписывается debug-ключом — тот баг уже
            // приводил к "не удалось обработать пакет" на апдейте, когда
            // apk на сервере и apk на устройстве были подписаны разными
            // debug.keystore с разных машин.
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            signingConfig = keystorePropertiesFile.exists()
                ? signingConfigs.release
                : signingConfigs.debug

            // Заливает native (NDK/Skia/engine) debug-символы в Crashlytics
            // на каждый release build — без этого нативные крэши (за
            // пределами Dart-исключений) приходят как сырые pc-офсеты
            // (base.apk + N), нечитаемые без ручной символизации.
            firebaseCrashlytics {
                nativeSymbolUploadEnabled true
            }
        }
    }

    // Настройка имени APK файла
    applicationVariants.all { variant ->
        variant.outputs.all {
            def buildType = variant.buildType.name
            def versionName = variant.versionName
            def versionCode = variant.versionCode
            def date = new Date().format('yyyy-MM-dd')
            
            if (buildType == "release") {
                outputFileName = "GeoAgro-v${versionName}-${versionCode}-${date}-release.apk"
            } else {
                outputFileName = "GeoAgro-v${versionName}-${versionCode}-${date}-debug.apk"
            }
        }
    }
}

flutter {
    source = "../.."
}
